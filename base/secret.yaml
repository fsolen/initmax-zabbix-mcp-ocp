# ⚠️ TEMPLATE - Production'da SealedSecrets veya ExternalSecrets kullanın
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-mcp-secret
  namespace: zabbix-mcp-server
  labels:
    app.kubernetes.io/name: zabbix-mcp-server
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # Zabbix API Tokens
  ZABBIX_PRODUCTION_TOKEN: "your-zabbix-api-token"
  # ZABBIX_STAGING_TOKEN: "your-staging-token"
  
  # MCP Server Auth Token (opsiyonel)
  # MCP_AUTH_TOKEN: "your-mcp-auth-token"
  
  # Admin Portal Password Hash
  # Oluşturmak için: ./deploy.sh generate-admin-password
  # veya: python3 -c "import hashlib,os; s=os.urandom(16); p=input('Password: '); print(f'scrypt:16384:8:1\${s.hex()}\${hashlib.scrypt(p.encode(),salt=s,n=16384,r=8,p=1,dklen=32).hex()}')"
  ADMIN_PASSWORD_HASH: "scrypt:16384:8:1$YOUR_SALT_HEX$YOUR_HASH_HEX"
